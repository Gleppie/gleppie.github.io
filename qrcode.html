
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Glep's  Bean Bag</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --code-block: #1a1a1a;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .tool-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Input Styling */
        .input-group {
            margin-bottom: 24px;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .generate-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .generate-btn:hover {
            opacity: 0.9;
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        /* QR Display Area */
        .qr-wrapper {
            margin-top: 30px;
            text-align: center;
        }

        #statusMessage {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 500;
        }

        #qrcode {
            background: white; /* QR codes need light background for scanning */
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        #qrcode img {
            display: block;
            margin: 0 auto;
        }

        .back-link {
            display: block;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            text-align: center;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="tool-container">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Enter a URL to generate a scannable code.</p>

        <div class="input-group">
            <input
                type="url"
                id="urlInput"
                placeholder="https://example.com"
                value="https://google.com"
            >
            <button class="generate-btn" onclick="generateQRCode()">
                Generate Code
            </button>
        </div>

        <div class="qr-wrapper">
            <div id="statusMessage">Ready to generate</div>
            <div id="qrcode"></div>
        </div>

        <a href="#index.html" class="back-link" onclick="window.history.back()">← Back</a>
    </div>

    <script>
        let qr = null;
        
        function generateQRCode() {
            const urlInput = document.getElementById('urlInput');
            const qrcodeContainer = document.getElementById('qrcode');
            const statusMessage = document.getElementById('statusMessage');
            
            const url = urlInput.value.trim() || 'https://google.com';

            // Clear previous
            qrcodeContainer.innerHTML = '';
            statusMessage.textContent = 'Scanning: ' + (url.length > 30 ? url.substring(0, 30) + '...' : url);
            
            try {
                qr = new QRCode(qrcodeContainer, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch (error) {
                statusMessage.textContent = 'Error: Link too long or invalid.';
            }
        }

        // Handle Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQRCode();
        });

        // Initial load
        window.onload = generateQRCode;
    </script>
</body>
</html>
