<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to CSS | Glep's Bean Bag</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <h1>PIXEL ART</h1>
        </div>
        
        <ul>
            <li><a href="index.html">← Back</a></li>
        </ul>

        <div class="control-panel" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <span class="label-text">1. Upload Image</span>
                <input type="file" id="upload" accept="image/*" style="width: 100%; margin-top: 8px; font-size: 0.7rem;">
            </div>

            <div>
                <span class="label-text">2. Pixel Scale: <strong id="scaleVal" style="color: var(--accent);">1</strong>px</span>
                <input type="range" id="scale" min="1" max="20" value="1" style="width: 100%; margin-top: 10px; accent-color: var(--accent);">
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <button id="copyBtn" id="footerBtn" style="width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer;">COPY CSS</button>
            <button id="downloadBtn" style="width: 100%; background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer;">DOWNLOAD HTML</button>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 2.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Image to CSS Box-Shadow</h2>
            <p style="color: var(--text-dim);">Transforms your pixels into a single-div masterpiece using only CSS shadows.</p>
        </header>

        <div class="preview-card">
            <span class="label-text" style="display: block; margin-bottom: 1rem; text-transform: uppercase;">Live Preview</span>
            <div id="preview-area">
                <div id="css-pixel"></div>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <span class="label-text" style="display: block; margin-bottom: 0.5rem;">Generated Code</span>
            <textarea id="css-code" readonly placeholder="Upload an image to generate code..."></textarea>
        </div>
    </main>

    <script>
        const upload = document.getElementById('upload');
        const scaleInput = document.getElementById('scale');
        const scaleVal = document.getElementById('scaleVal');
        const cssPixel = document.getElementById('css-pixel');
        const cssCode = document.getElementById('css-code');

        let lastImage = null;

        scaleInput.addEventListener('input', () => {
            scaleVal.innerText = scaleInput.value;
            if (lastImage) processImage(lastImage);
        });

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    lastImage = img;
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function processImage(img) {
            const scale = parseInt(scaleInput.value);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const maxWidth = 80; 
            let w = img.width;
            let h = img.height;
            if (w > maxWidth) {
                h = (maxWidth / w) * h;
                w = maxWidth;
            }

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            const data = ctx.getImageData(0, 0, w, h).data;
            let shadows = [];

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    if (data[i + 3] > 10) { 
                        shadows.push(`${x * scale}px ${y * scale}px 0 ${scale / 2}px rgba(${data[i]},${data[i+1]},${data[i+2]},${data[i+3]/255})`);
                    }
                }
            }

            const style = `width: 0; height: 0; box-shadow: ${shadows.join(', ')};`;
            cssPixel.style.cssText = style;
            cssCode.value = style;
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            cssCode.select();
            document.execCommand('copy');
            const originalText = document.getElementById('copyBtn').innerText;
            document.getElementById('copyBtn').innerText = 'COPIED!';
            setTimeout(() => document.getElementById('copyBtn').innerText = originalText, 2000);
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            const htmlContent = `<!DOCTYPE html><html><body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;">
            <div style="${cssCode.value}"></div>
            </body></html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'css-pixel-art.html';
            link.click();
        });
    </script>
</body>
</html>
