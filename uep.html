<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPU | Glep's  Bean Bag</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <h1>EPU GEN</h1>
        </div>
        
        <ul>
            <li><a href="index.html">← Back</a></li>
        </ul>

        <div style="margin-top: auto;">
            <button id="generate" id="footerBtn" style="width: 100%; cursor: pointer; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">
                Generate Credentials
            </button>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 2.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Identity Generator</h2>
            <p style="color: var(--text-dim);">Generate random Email, Username, and Password sets for staging and testing.</p>
        </header>

        <div id="output" style="display: none;">
            <div class="credential-container">
                <div class="data-card">
                    <span class="label-text">Username</span>
                    <div class="value-wrapper">
                        <span class="value-text" id="val-user">---</span>
                    </div>
                </div>

                <div class="data-card">
                    <span class="label-text">Email Address</span>
                    <div class="value-wrapper">
                        <span class="value-text" id="val-email">---</span>
                    </div>
                </div>

                <div class="data-card">
                    <span class="label-text">Generated Password</span>
                    <div class="value-wrapper">
                        <span class="value-text" id="val-pass" style="font-family: monospace;">---</span>
                    </div>
                </div>
            </div>
            
            <div class="disclaimer-card" style="margin-top: 2rem;">
                <div class="disclaimer-header">
                    <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <h2>Tip</h2>
                </div>
                <p>Click any field above to <strong>instantly copy</strong> the value to your clipboard.</p>
            </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('generate');
        const display = document.getElementById('output');
        const uName = document.getElementById('val-user');
        const uEmail = document.getElementById('val-email');
        const uPass = document.getElementById('val-pass');

        btn.addEventListener('click', async () => {
            btn.innerText = "FETCHING...";
            btn.disabled = true;

            try {
                const response = await fetch('https://randomuser.me/api');
                const data = await response.json();
                const user = data.results[0];
                const username = user.login.username;
                const domain = ['proton.me', 'outlook.com', 'gmail.com'][Math.floor(Math.random() * 3)];

                uName.innerText = username;
                uEmail.innerText = `${username}@${domain}`;
                uPass.innerText = Math.random().toString(36).slice(-10) + "!";

                display.style.display = "block";
            } catch (e) {
                alert("Error connecting to API");
            } finally {
                btn.innerText = "GENERATE CREDENTIALS";
                btn.disabled = false;
            }
        });

        document.querySelectorAll('.value-text').forEach(item => {
            item.addEventListener('click', () => {
                const text = item.innerText;
                navigator.clipboard.writeText(text);
                const originalColor = item.style.color;
                
                item.innerText = "Copied!";
                item.style.color = "#fff";
                
                setTimeout(() => {
                    item.innerText = text;
                    item.style.color = originalColor;
                }, 800);
            });
        });
    </script>
</body>
</html>
