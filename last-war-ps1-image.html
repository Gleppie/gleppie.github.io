<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Link Page</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0; /* Light grey background */
        }
        img {
            max-width: 100%;
            height: auto;
            border: none;
            transition: transform 0.2s;
        }
        img:hover {
            transform: scale(1.02); /* Slight zoom effect on hover */
        }
    </style>
</head>
<body>

    <a href="https://www.your-destination-link.com">
        <img src="images/map2.png" alt="Clickable Image">
    </a>

</body>
</html>
