<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Pastebin | Glep's Bean Bag</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.6; 
        }

        /* --- Back Button --- */
        .back-nav { margin-bottom: 20px; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .back-link svg { width: 16px; height: 16px; }

        h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        textarea { 
            width: 100%; 
            height: 350px; 
            padding: 20px; 
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.9rem;
            resize: vertical;
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600;
            margin-top: 15px;
        }

        #link-display { 
            margin-top: 25px; 
            padding: 20px; 
            background: var(--card-hover); 
            border: 1px dashed var(--accent); 
            border-radius: 12px;
            display: none; 
            word-break: break-all; 
        }

        pre { 
            background: var(--input-bg); 
            padding: 25px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            white-space: pre-wrap; 
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .hidden { display: none; }
        
        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Bean Bag
        </a>
    </div>

    <div id="create-view" class="container">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Cloud Paste
        </h1>
        <textarea id="input" placeholder="Paste your code or text here..."></textarea>
        <button onclick="savePaste()">Get Short Link</button>
        
        <div id="link-display">
            <strong style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Cloud Link Generated</strong>
            <a id="share-url" href="#" style="color: var(--accent); text-decoration: none; font-family: monospace; display: block; margin-top: 8px;"></a>
        </div>
    </div>

    <div id="read-view" class="container hidden">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            Viewing Intel
        </h1>
        <pre id="content-output"></pre>
        <button onclick="location.href=window.location.pathname" style="background: var(--text-dim);">Create New</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://qhkytrrkmgxuisrkpyjf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hNPT_9MfLOxpG1qvbTfwJg_KKwICt7h';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function savePaste() {
            const text = document.getElementById('input').value;
            if (!text) return;

            const shortId = Math.random().toString(36).substring(2, 8);

            const { error } = await _supabase
                .from('pastes')
                .insert([{ id: shortId, content: text }]);

            if (!error) {
                const link = window.location.origin + window.location.pathname + '?p=' + shortId;
                const shareA = document.getElementById('share-url');
                shareA.innerText = link;
                shareA.href = link;
                document.getElementById('link-display').style.display = 'block';
            } else {
                alert("Cloud Error: " + error.message);
            }
        }

        async function loadPaste() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('p');

            if (id) {
                const { data, error } = await _supabase
                    .from('pastes')
                    .select('content')
                    .eq('id', id)
                    .single();

                if (data) {
                    document.getElementById('create-view').classList.add('hidden');
                    document.getElementById('read-view').classList.remove('hidden');
                    document.getElementById('content-output').innerText = data.content;
                }
            }
        }

        window.onload = loadPaste;
    </script>
</body>
</html>
