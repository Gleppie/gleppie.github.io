<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Pastebin | Glep's Bean Bag</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.6; 
        }

        /* --- Back Button Style --- */
        .back-nav {
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #create-mode, #view-mode {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        textarea { 
            width: 100%; 
            height: 350px; 
            padding: 20px; 
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.9rem;
            resize: vertical;
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600;
        }

        #output { 
            display: none; 
            margin-top: 25px; 
            background: var(--card-hover); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            word-break: break-all; 
        }

        #share-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 0.85rem; 
            display: block;
            margin-top: 8px;
        }

        .hidden { display: none; }

        pre { 
            background: var(--input-bg); 
            padding: 25px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            white-space: pre-wrap; 
            font-size: 0.9rem;
            overflow-x: auto;
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            </svg>
            ← Back
        </a>
    </div>

    <div id="create-mode">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Create Paste
        </h1>
        <textarea id="input" placeholder="Enter code or text to share..."></textarea>
        <br><br>
        <button onclick="generateLink()">Generate Shareable Link</button>
        
        <div id="output">
            <strong style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Link Ready</strong>
            <a id="share-link" href="#" target="_blank"></a>
            <p><small style="color: var(--text-dim); font-size: 0.7rem;">Share this URL; it contains your data encoded directly in the hash.</small></p>
        </div>
    </div>

    <div id="view-mode" class="hidden">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            View Paste
        </h1>
        <pre id="content-display"></pre>
        <br>
        <button onclick="window.location.hash=''; location.reload();">Create New</button>
    </div>

    <script>
        function generateLink() {
            const text = document.getElementById('input').value;
            if (!text) return;
            const encoded = btoa(unescape(encodeURIComponent(text)));
            const link = window.location.origin + window.location.pathname + '#' + encoded;
            const shareLink = document.getElementById('share-link');
            shareLink.href = link;
            shareLink.innerText = link;
            document.getElementById('output').style.display = 'block';
        }

        function checkURL() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const decoded = decodeURIComponent(escape(atob(hash)));
                    document.getElementById('create-mode').classList.add('hidden');
                    document.getElementById('view-mode').classList.remove('hidden');
                    document.getElementById('content-display').innerText = decoded;
                } catch (e) {
                    console.error("Invalid link");
                }
            }
        }

        window.addEventListener('hashchange', checkURL);
        window.onload = checkURL;
    </script>
</body>
</html>
