<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPU | Glep's  Bean Bag</title>
    <style>
        /* --- GLOBAL SANDBOX DESIGN SYSTEM --- */
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 { font-size: 1.8rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; margin-top: 8px; }

        .back-link {
            display: block;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            text-align: left;
        }
        .back-link:hover { color: var(--text-main); }

        /* --- TOOL SPECIFIC STYLES --- */
        .gen-controls {
            text-align: center;
            margin-bottom: 32px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }

        #output {
            animation: slideUp 0.3s ease-out;
        }

        .credential-card {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .data-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .data-field:last-child { border: none; }

        .label-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .value-text {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.95rem;
            color: var(--accent);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .value-text:hover { background: var(--card-hover); }

        .tip {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 16px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Back</a>
    
    <header>
        <h1>Username Email Password Generator</h1>
        <p class="subtitle">Quickly generate random user data for testing.</p>
    </header>

    <main>
        <div class="gen-controls">
            <button id="generate" class="btn-primary">Generate Credentials</button>
        </div>

        <div id="output" style="display: none;">
            <div class="credential-card">
                <div class="data-field">
                    <span class="label-text">Username</span>
                    <span class="value-text" id="val-user" title="Click to copy"></span>
                </div>
                <div class="data-field">
                    <span class="label-text">Email</span>
                    <span class="value-text" id="val-email" title="Click to copy"></span>
                </div>
                <div class="data-field">
                    <span class="label-text">Password</span>
                    <span class="value-text" id="val-pass" title="Click to copy"></span>
                </div>
            </div>
            <p class="tip">Click any value above to copy to clipboard.</p>
        </div>
    </main>
</div>

<script>
    const btn = document.getElementById('generate');
    const display = document.getElementById('output');
    
    // UI References
    const uName = document.getElementById('val-user');
    const uEmail = document.getElementById('val-email');
    const uPass = document.getElementById('val-pass');

    btn.addEventListener('click', async () => {
        btn.innerText = "Fetching...";
        btn.disabled = true;

        try {
            const response = await fetch('https://randomuser.me/api');
            const data = await response.json();
            const user = data.results[0];
            
            const username = user.login.username;
            const domain = ['proton.me', 'outlook.com', 'gmail.com'][Math.floor(Math.random() * 3)];

            uName.innerText = username;
            uEmail.innerText = `${username}@${domain}`;
            uPass.innerText = Math.random().toString(36).slice(-10) + "!";

            display.style.display = "block";
        } catch (e) {
            alert("Error connecting to API");
        } finally {
            btn.innerText = "Generate Credentials";
            btn.disabled = false;
        }
    });

    // Copy to clipboard logic
    document.querySelectorAll('.value-text').forEach(item => {
        item.addEventListener('click', () => {
            const text = item.innerText;
            navigator.clipboard.writeText(text);
            
            item.innerText = "Copied!";
            item.style.color = "var(--text-main)";
            
            setTimeout(() => {
                item.innerText = text;
                item.style.color = "var(--accent)";
            }, 800);
        });
    });
</script>

</body>
</html>
