<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last War Survival Map | Glep's Bean Bag</title>
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --panel-bg: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --panel-bg: rgba(30, 30, 30, 0.7);
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-color);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            gap: 20px;
        }

        .left-sect { display: flex; align-items: center; gap: 15px; }
        .tool-bar { display: flex; align-items: center; gap: 8px; }
        .header-actions { display: flex; gap: 6px; align-items: center; }

        .logo { font-weight: 700; font-size: 0.9rem; letter-spacing: -0.5px; white-space: nowrap; }
        .logo span { color: var(--text-dim); font-weight: 400; font-size: 0.8rem; margin-left: 4px; }

        button {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.7rem; 
            font-weight: 500; transition: 0.2s; white-space: nowrap; touch-action: manipulation;
        }

        button:hover { border-color: var(--text-main); color: var(--text-main); background: var(--card-hover); }
        button.active { background: var(--accent); color: white; border-color: var(--accent); }
        #btn-save { background: var(--accent) !important; color: white !important; border: none !important; }

        input[type="color"] { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; width: 50px; }

        /* --- Map Viewport --- */
        main {
            flex-grow: 1;
            position: relative;
            background-color: var(--card-hover);
            overflow: auto; /* Enable scrolling */
            display: block; /* Important for padding to work */
            -webkit-overflow-scrolling: touch;
        }

        /* The Spacer provides the "Extra Room" to scroll past edges */
        #scroll-spacer {
            position: relative;
            padding: 50vh 50vw; /* 50% of screen size padding on all sides */
            display: inline-block;
        }

        #canvas-stack {
            position: relative;
            background: #000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }
        #draw-layer { z-index: 5; }

        .coords-panel {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--accent);
            z-index: 10;
            pointer-events: none;
        }

        /* --- Joystick --- */
        #joystick-base {
            position: fixed;
            bottom: 40px;
            left: 30px;
            width: 90px;
            height: 90px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border);
            border-radius: 50%;
            z-index: 2000;
            display: none; 
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 768px) {
            header { flex-direction: column; height: auto; padding: 10px; gap: 10px; }
            .left-sect, .tool-bar, .header-actions { width: 100%; justify-content: space-around; }
            .header-actions { border-top: 1px solid var(--border); padding-top: 8px; }
            #joystick-base { display: block; }
        }
    </style>
</head>
<body>

<header>
    <div class="left-sect">
        <div class="logo">Last War <span>WAR MAP</span></div>
        <input type="color" id="colorPicker" value="#0070f3">
    </div>

    <div class="tool-bar">
        <button class="btn-tool active" onclick="setMode('paint', this)">Brush</button>
        <button class="btn-tool" onclick="setMode('line', this)">Line</button>
        <button class="btn-tool" onclick="setMode('rect', this)">Box</button>
        <button class="btn-tool" onclick="setMode('circle', this)">Circle</button>
        <button class="btn-tool" onclick="setMode('text', this)">Note</button>
        <button class="btn-tool" onclick="setMode('erase', this)">Erase</button>
        <input type="range" id="brushSize" min="1" max="60" value="4">
    </div>

    <div class="header-actions">
        <button onclick="undo()">Undo</button>
        <button onclick="clearMap()" style="color: #ff4d4d;">Clear</button>
        <button id="btn-save" onclick="downloadMap()">Export</button>
    </div>
</header>

<main id="map-container">
    <div id="scroll-spacer">
        <div id="canvas-stack">
            <canvas id="map-layer"></canvas>
            <canvas id="draw-layer"></canvas>
        </div>
    </div>
    <div class="coords-panel" id="coords">0, 0</div>
</main>

<div id="joystick-base">
    <div id="joystick-stick"></div>
</div>

<script>
    const container = document.getElementById('map-container');
    const mapC = document.getElementById('map-layer');
    const drawC = document.getElementById('draw-layer');
    const mctx = mapC.getContext('2d');
    const dctx = drawC.getContext('2d');
    
    let isDrawing = false;
    let startX, startY, snapshot;
    let currentMode = 'paint';
    let history = [];

    // Load Map
    const mapImg = new Image();
    mapImg.src = 'images/map2.png'; 
    mapImg.onload = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        document.getElementById('canvas-stack').style.width = w + 'px';
        document.getElementById('canvas-stack').style.height = h + 'px';
        mctx.drawImage(mapImg, 0, 0, w, h);
        
        // Center the map on load
        container.scrollLeft = (1100 / 2);
        container.scrollTop = (825 / 2);
        saveState();
    };

    // Joystick Logic
    const jBase = document.getElementById('joystick-base');
    const jStick = document.getElementById('joystick-stick');
    let jActive = false;
    let jInput = { x: 0, y: 0 };

    jBase.addEventListener('touchstart', (e) => { jActive = true; });
    window.addEventListener('touchmove', (e) => { 
        if(!jActive) return;
        e.preventDefault();
        const touch = e.touches[0];
        const rect = jBase.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width / 2);
        const angle = Math.atan2(dy, dx);
        jStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        jInput.x = (Math.cos(angle) * dist) / (rect.width / 2);
        jInput.y = (Math.sin(angle) * dist) / (rect.width / 2);
    }, {passive: false});

    window.addEventListener('touchend', () => { 
        jActive = false; jInput = { x: 0, y: 0 }; 
        jStick.style.transform = `translate(-50%, -50%)`;
    });

    function panLoop() {
        if (jInput.x !== 0 || jInput.y !== 0) {
            container.scrollLeft += jInput.x * 16;
            container.scrollTop += jInput.y * 16;
        }
        requestAnimationFrame(panLoop);
    }
    panLoop();

    // Drawing Logic
    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function saveState() {
        if (history.length > 20) history.shift();
        history.push(dctx.getImageData(0, 0, drawC.width, drawC.height));
    }

    function undo() {
        if (history.length > 1) { history.pop(); dctx.putImageData(history[history.length - 1], 0, 0); }
    }

    const getPos = (e) => {
        const rect = drawC.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (drawC.width / rect.width), 
            y: (clientY - rect.top) * (drawC.height / rect.height) 
        };
    };

    const startDraw = (e) => {
        const p = getPos(e);
        isDrawing = true; startX = p.x; startY = p.y;
        dctx.strokeStyle = document.getElementById('colorPicker').value;
        dctx.lineWidth = document.getElementById('brushSize').value;
        dctx.lineCap = dctx.lineJoin = 'round';
        if (currentMode === 'paint' || currentMode === 'erase') { dctx.beginPath(); dctx.moveTo(p.x, p.y); }
        else { snapshot = dctx.getImageData(0, 0, drawC.width, drawC.height); }
    };

    const moveDraw = (e) => {
        const p = getPos(e);
        document.getElementById('coords').innerText = `${Math.round(p.x)}, ${Math.round(p.y)}`;
        if (!isDrawing) return;
        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.globalCompositeOperation = (currentMode === 'erase') ? 'destination-out' : 'source-over';
            dctx.lineTo(p.x, p.y); dctx.stroke();
        } else {
            dctx.putImageData(snapshot, 0, 0);
            dctx.beginPath();
            if (currentMode === 'rect') dctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
            else if (currentMode === 'circle') {
                let r = Math.sqrt(Math.pow(p.x-startX,2)+Math.pow(p.y-startY,2));
                dctx.arc(startX, startY, r, 0, 2*Math.PI); dctx.stroke();
            } else if (currentMode === 'line') { dctx.moveTo(startX, startY); dctx.lineTo(p.x, p.y); dctx.stroke(); }
        }
    };

    drawC.addEventListener('mousedown', startDraw);
    window.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', () => { if(isDrawing) saveState(); isDrawing = false; });

    drawC.addEventListener('touchstart', (e) => { if(e.target===drawC) e.preventDefault(); startDraw(e); }, {passive:false});
    drawC.addEventListener('touchmove', (e) => { if(e.target===drawC) e.preventDefault(); moveDraw(e); }, {passive:false});
    drawC.addEventListener('touchend', () => { if(isDrawing) saveState(); isDrawing = false; });

    function clearMap() { if(confirm("Clear?")) { dctx.clearRect(0,0,drawC.width,drawC.height); saveState(); } }
    function downloadMap() {
        const out = document.createElement('canvas'); out.width=1100; out.height=825;
        const octx = out.getContext('2d'); octx.drawImage(mapC,0,0); octx.drawImage(drawC,0,0);
        const link = document.createElement('a'); link.download='map.png'; link.href=out.toDataURL(); link.click();
    }
</script>

</body>
</html>
