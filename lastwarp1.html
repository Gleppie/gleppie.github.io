<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Survival Map | Glep's Bean Bag</title>
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --modal-bg: rgba(255, 255, 255, 0.98);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --tag-bg: #eeeeee;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --modal-bg: rgba(10, 10, 10, 0.98);
                --panel-bg: rgba(10, 10, 10, 0.85);
                --tag-bg: #222222;
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-color);
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tool-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 4px;
            flex-wrap: wrap;
        }

        .logo { font-weight: 700; font-size: 1rem; letter-spacing: -0.5px; }
        .logo span { display: none; } /* Hide sub-text on small headers */

        @media (min-width: 600px) {
            .logo { font-size: 1.1rem; }
            .logo span { display: inline; color: var(--text-dim); font-weight: 400; font-size: 0.9rem; margin-left: 8px; }
        }

        .header-actions { display: flex; gap: 6px; }

        button {
            background: none; 
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: 6px;
            font-size: 0.75rem; 
            font-weight: 500;
            transition: 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
        }

        button:hover { border-color: var(--text-main); color: var(--text-main); background: var(--card-hover); }
        button.active { background: var(--accent); color: white; border-color: var(--accent); }

        #btn-save {
            background: var(--accent) !important;
            color: white !important;
            border: none !important;
        }

        /* --- Tool Elements --- */
        .tool-item { display: flex; align-items: center; gap: 8px; }
        .control-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }

        input[type="color"] { 
            width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 4px; 
            padding: 0; cursor: pointer; background: none;
        }

        input[type="range"] { accent-color: var(--accent); cursor: pointer; width: 60px; }

        /* --- Main Canvas Area --- */
        main {
            flex-grow: 1;
            position: relative;
            background-color: var(--card-hover);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrolling on mobile */
            overflow: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        #canvas-stack {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #000;
            max-width: 100%;
            height: auto;
        }

        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }
        #draw-layer { z-index: 5; }

        .coords-panel {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.7rem;
            font-family: monospace;
            color: var(--accent);
            z-index: 10;
            pointer-events: none;
        }

        .back-link { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; margin-right: 12px; }

        /* Tablet/Mobile Adjustments */
        @media (max-width: 768px) {
            .tool-bar { gap: 8px; justify-content: center; }
            .header-actions { width: 100%; justify-content: space-between; order: 3; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px;}
            input[type="range"] { width: 50px; }
        }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div style="display: flex; align-items: center;">
            <a href="index.html" class="back-link">←</a>
            <div class="logo">Last War <span>WAR MAP</span></div>
        </div>
        <div class="tool-item">
            <span class="control-label">Color</span>
            <input type="color" id="colorPicker" value="#0070f3">
        </div>
    </div>

    <div class="tool-bar">
        <button class="btn-tool active" onclick="setMode('paint', this)">Brush</button>
        <button class="btn-tool" onclick="setMode('line', this)">Line</button>
        <button class="btn-tool" onclick="setMode('rect', this)">Box</button>
        <button class="btn-tool" onclick="setMode('circle', this)">Circle</button>
        <button class="btn-tool" onclick="setMode('text', this)">Note</button>
        <button class="btn-tool" onclick="setMode('erase', this)">Erase</button>
        
        <div class="tool-item">
            <span class="control-label">Size <span id="sizeVal" style="color: var(--accent);">4</span></span>
            <input type="range" id="brushSize" min="1" max="60" value="4" oninput="document.getElementById('sizeVal').innerText = this.value">
        </div>
    </div>

    <div class="header-actions">
        <button onclick="undo()">Undo</button>
        <button onclick="clearMap()" style="border-color: rgba(255,0,0,0.2); color: #ff4d4d;">Clear</button>
        <button id="btn-save" onclick="downloadMap()">Export PNG</button>
    </div>
</header>

<main>
    <div id="canvas-stack">
        <canvas id="map-layer"></canvas>
        <canvas id="draw-layer"></canvas>
    </div>
    <div class="coords-panel" id="coords">0, 0</div>
</main>

<script>
    const mapC = document.getElementById('map-layer');
    const drawC = document.getElementById('draw-layer');
    const mctx = mapC.getContext('2d');
    const dctx = drawC.getContext('2d');
    
    let isDrawing = false;
    let startX, startY;
    let currentMode = 'paint';
    let snapshot = null;
    let history = [];

    const mapImg = new Image();
    mapImg.src = 'images/map2.png'; 

    mapImg.onload = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        document.getElementById('canvas-stack').style.width = w + 'px';
        document.getElementById('canvas-stack').style.height = h + 'px';
        mctx.drawImage(mapImg, 0, 0, w, h);
        saveState();
    };

    mapImg.onerror = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        mctx.fillStyle = "#111"; 
        mctx.fillRect(0,0,w,h);
        saveState();
    };

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function saveState() {
        if (history.length > 25) history.shift();
        history.push(dctx.getImageData(0, 0, drawC.width, drawC.height));
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            dctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    const getPos = (e) => {
        const rect = drawC.getBoundingClientRect();
        // Support touch events vs mouse events
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        return { 
            x: (clientX - rect.left) * (drawC.width / rect.width), 
            y: (clientY - rect.top) * (drawC.height / rect.height) 
        };
    };

    const startDraw = (e) => {
        const p = getPos(e);
        isDrawing = true;
        startX = p.x; startY = p.y;
        
        dctx.globalAlpha = 1.0; 
        dctx.strokeStyle = document.getElementById('colorPicker').value;
        dctx.lineWidth = document.getElementById('brushSize').value;
        dctx.lineCap = 'round';
        dctx.lineJoin = 'round';

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.beginPath();
            dctx.moveTo(p.x, p.y);
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            snapshot = dctx.getImageData(0, 0, drawC.width, drawC.height);
        } else if (currentMode === 'text') {
            const txt = prompt("Note:");
            if (txt) {
                dctx.fillStyle = document.getElementById('colorPicker').value;
                dctx.font = `600 ${document.getElementById('brushSize').value * 3}px -apple-system, sans-serif`;
                dctx.fillText(txt, p.x, p.y);
                saveState();
            }
            isDrawing = false;
        }
    };

    const moveDraw = (e) => {
        const p = getPos(e);
        document.getElementById('coords').innerText = `${Math.round(p.x)}, ${Math.round(p.y)}`;
        if (!isDrawing) return;

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.globalCompositeOperation = (currentMode === 'erase') ? 'destination-out' : 'source-over';
            dctx.lineTo(p.x, p.y);
            dctx.stroke();
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            dctx.putImageData(snapshot, 0, 0);
            dctx.globalCompositeOperation = 'source-over';
            dctx.beginPath();
            if (currentMode === 'rect') dctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
            else if (currentMode === 'circle') {
                let r = Math.sqrt(Math.pow(p.x - startX, 2) + Math.pow(p.y - startY, 2));
                dctx.arc(startX, startY, r, 0, 2 * Math.PI);
                dctx.stroke();
            } else if (currentMode === 'line') {
                dctx.moveTo(startX, startY); dctx.lineTo(p.x, p.y); dctx.stroke();
            }
        }
    };

    const endDraw = () => { if (isDrawing) saveState(); isDrawing = false; };

    // Mouse listeners
    drawC.onmousedown = startDraw;
    drawC.onmousemove = moveDraw;
    window.onmouseup = endDraw;

    // Touch listeners for mobile support
    drawC.addEventListener('touchstart', (e) => {
        if (e.target === drawC) e.preventDefault();
        startDraw(e);
    }, { passive: false });

    drawC.addEventListener('touchmove', (e) => {
        if (e.target === drawC) e.preventDefault();
        moveDraw(e);
    }, { passive: false });

    drawC.addEventListener('touchend', (e) => {
        endDraw();
    }, { passive: false });

    function clearMap() {
        if(confirm("Clear markings?")) {
            dctx.clearRect(0,0,drawC.width, drawC.height);
            saveState();
        }
    }

    function downloadMap() {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = mapC.width; finalCanvas.height = mapC.height;
        const fctx = finalCanvas.getContext('2d');
        fctx.drawImage(mapC, 0, 0);
        fctx.drawImage(drawC, 0, 0);
        const link = document.createElement('a');
        link.download = `Tactical-Map.png`;
        link.href = finalCanvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
