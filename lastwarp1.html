<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Survival Map | Glep's  SandBox</title>
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --modal-bg: rgba(255, 255, 255, 0.98);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --tag-bg: #eeeeee;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --modal-bg: rgba(10, 10, 10, 0.98);
                --panel-bg: rgba(10, 10, 10, 0.85);
                --tag-bg: #222222;
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo span { color: var(--text-dim); font-weight: 400; font-size: 0.9rem; margin-left: 8px;}

        .header-tools { display: flex; gap: 8px; }

        .header-tools button {
            background: none; 
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px; 
            cursor: pointer; 
            border-radius: 20px;
            font-size: 0.8rem; 
            font-weight: 500;
            transition: 0.2s;
        }

        .header-tools button:hover { border-color: var(--text-main); color: var(--text-main); background: var(--card-hover); }

        #btn-save {
            background: var(--accent) !important;
            color: white !important;
            border: none !important;
        }

        /* --- Main Canvas Area --- */
        main {
            flex-grow: 1;
            position: relative;
            background-color: var(--card-hover);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 40px;
        }

        #canvas-stack {
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #000; /* Backdrop for map */
            overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        #draw-layer { z-index: 5; }

        /* --- Panels --- */
        .panel {
            position: absolute;
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .left-panel { top: 20px; left: 20px; width: 160px; }
        .right-panel { bottom: 20px; right: 20px; padding: 8px 12px; border-radius: 30px; }

        h3 { 
            margin: 0 0 12px 0; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--text-dim);
            font-weight: 700;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .btn-tool {
            padding: 8px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .btn-tool:hover { background: var(--card-hover); color: var(--text-main); }
        .btn-tool.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tool-group { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        .control-label { display: block; font-size: 0.7rem; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }
        
        /* Inputs */
        input[type="color"] { 
            width: 100%; height: 30px; border: 1px solid var(--border); border-radius: 6px; 
            padding: 2px; cursor: pointer; background: var(--bg-color);
        }

        input[type="range"] { 
            width: 100%; accent-color: var(--accent); cursor: pointer; margin: 0;
        }

        .stat-val { font-size: 0.8rem; font-family: monospace; font-weight: 600; color: var(--accent); }

        .back-link {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-right: 20px;
        }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <a href="index.html" class="back-link">← Back</a>
        <div class="logo">Last War <span>Tactical Intel</span></div>
    </div>
    <div class="header-tools">
        <button onclick="undo()">Undo</button>
        <button id="btn-save" onclick="downloadMap()">Export PNG</button>
        <button onclick="clearMap()" style="border-color: rgba(255,0,0,0.2); color: #ff4d4d;">Clear</button>
    </div>
</header>

<main>
    <div id="canvas-stack">
        <canvas id="map-layer"></canvas>
        <canvas id="draw-layer"></canvas>
    </div>

    <div class="panel left-panel">
        <h3>Brush Type</h3>
        <div class="tool-grid">
            <button class="btn-tool active" onclick="setMode('paint', this)">Brush</button>
            <button class="btn-tool" onclick="setMode('line', this)">Line</button>
            <button class="btn-tool" onclick="setMode('rect', this)">Box</button>
            <button class="btn-tool" onclick="setMode('circle', this)">Circle</button>
            <button class="btn-tool" onclick="setMode('text', this)">Note</button>
            <button class="btn-tool" onclick="setMode('erase', this)">Erase</button>
        </div>
        
        <div class="tool-group">
            <span class="control-label">Color</span>
            <input type="color" id="colorPicker" value="#0070f3">
        </div>

        <div class="tool-group">
            <div style="display:flex; justify-content:space-between; margin-bottom: 4px;">
                <span class="control-label">Size</span>
                <span id="sizeVal" style="font-size:0.7rem; color: var(--accent);">4</span>
            </div>
            <input type="range" id="brushSize" min="1" max="60" value="4" oninput="document.getElementById('sizeVal').innerText = this.value">
        </div>

        <div class="tool-group">
            <span class="control-label">Opacity</span>
            <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="1">
        </div>
    </div>
    
    <div class="panel right-panel">
        <span class="stat-val" id="coords">0, 0</span>
    </div>
</main>

<script>
    // Keeping all your existing logic, only updating the visual Font-Family and defaults
    const mapC = document.getElementById('map-layer');
    const drawC = document.getElementById('draw-layer');
    const mctx = mapC.getContext('2d');
    const dctx = drawC.getContext('2d');
    
    let isDrawing = false;
    let startX, startY;
    let currentMode = 'paint';
    let snapshot = null;
    let history = [];

    const mapImg = new Image();
    mapImg.src = 'images/map2.png'; 

    mapImg.onload = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        document.getElementById('canvas-stack').style.width = w + 'px';
        document.getElementById('canvas-stack').style.height = h + 'px';
        mctx.drawImage(mapImg, 0, 0, w, h);
        saveState();
    };

    mapImg.onerror = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        mctx.fillStyle = "#111"; 
        mctx.fillRect(0,0,w,h);
        saveState();
    };

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function saveState() {
        if (history.length > 25) history.shift();
        history.push(dctx.getImageData(0, 0, drawC.width, drawC.height));
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            dctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    const getPos = (e) => {
        const rect = drawC.getBoundingClientRect();
        return { 
            x: (e.clientX - rect.left) * (drawC.width / rect.width), 
            y: (e.clientY - rect.top) * (drawC.height / rect.height) 
        };
    };

    drawC.onmousedown = (e) => {
        const p = getPos(e);
        isDrawing = true;
        startX = p.x; startY = p.y;
        
        dctx.globalAlpha = document.getElementById('opacity').value;
        dctx.strokeStyle = document.getElementById('colorPicker').value;
        dctx.lineWidth = document.getElementById('brushSize').value;
        dctx.lineCap = 'round';
        dctx.lineJoin = 'round';

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.beginPath();
            dctx.moveTo(p.x, p.y);
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            snapshot = dctx.getImageData(0, 0, drawC.width, drawC.height);
        } else if (currentMode === 'text') {
            const txt = prompt("Note:");
            if (txt) {
                dctx.fillStyle = document.getElementById('colorPicker').value;
                dctx.font = `600 ${document.getElementById('brushSize').value * 3}px -apple-system, sans-serif`;
                dctx.fillText(txt, p.x, p.y);
                saveState();
            }
            isDrawing = false;
        }
    };

    drawC.onmousemove = (e) => {
        const p = getPos(e);
        document.getElementById('coords').innerText = `${Math.round(p.x)}, ${Math.round(p.y)}`;
        if (!isDrawing) return;

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.globalCompositeOperation = (currentMode === 'erase') ? 'destination-out' : 'source-over';
            dctx.lineTo(p.x, p.y);
            dctx.stroke();
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            dctx.putImageData(snapshot, 0, 0);
            dctx.globalCompositeOperation = 'source-over';
            dctx.beginPath();
            if (currentMode === 'rect') dctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
            else if (currentMode === 'circle') {
                let r = Math.sqrt(Math.pow(p.x - startX, 2) + Math.pow(p.y - startY, 2));
                dctx.arc(startX, startY, r, 0, 2 * Math.PI);
                dctx.stroke();
            } else if (currentMode === 'line') {
                dctx.moveTo(startX, startY); dctx.lineTo(p.x, p.y); dctx.stroke();
            }
        }
    };

    window.onmouseup = () => { if (isDrawing) saveState(); isDrawing = false; };

    function clearMap() {
        if(confirm("Clear markings?")) {
            dctx.clearRect(0,0,drawC.width, drawC.height);
            saveState();
        }
    }

    function downloadMap() {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = mapC.width; finalCanvas.height = mapC.height;
        const fctx = finalCanvas.getContext('2d');
        fctx.drawImage(mapC, 0, 0);
        fctx.drawImage(drawC, 0, 0);
        const link = document.createElement('a');
        link.download = `Tactical-Map.png`;
        link.href = finalCanvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
