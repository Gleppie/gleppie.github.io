<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Paste | J Projects</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Targeted fix for the disclaimer and editor layout */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .disclaimer-card {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid var(--border);
            border-left: 4px solid var(--emerald);
            padding: 1.25rem;
            border-radius: 0.5rem;
        }

        .disclaimer-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .disclaimer-header h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
            color: var(--text-main);
        }

        .editor-container {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 400px;
            height: 60vh;
        }

        #textInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            padding: 1.5rem;
            resize: none;
            outline: none;
        }

        .editor-footer {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.75rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <h1>J_Projects <span style="font-size: 0.5rem; display: block; opacity: 0.5;">SCRATCH_PAD_v1</span></h1>
        </div>
        
        <ul style="list-style: none; padding: 0; margin: 2rem 0;">
            <li><a href="../index.html" style="text-decoration: none; color: var(--text-dim); font-size: 0.8rem;">← DASHBOARD</a></li>
        </ul>

        <div class="control-panel">
            <span class="label-text">Operations</span>
            <button onclick="downloadFile()" class="execute-btn" style="margin-top: 10px; width: 100%;">Export .txt</button>
            <button onclick="clearEditor()" style="margin-top: 10px; width: 100%; background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 10px; cursor: pointer; border-radius: 4px; font-size: 0.7rem;">Wipe Buffer</button>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <h2 style="color: var(--emerald); text-transform: uppercase; letter-spacing: 0.2em;">Quick Paste</h2>
        </header>

        <!-- The section that was causing issues -->
        <section class="disclaimer-card">
            <div class="disclaimer-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--emerald)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h2>Memory Alert</h2>
            </div>
            <p style="font-size: 0.8rem; margin: 0; color: var(--text-dim);">Content is stored in active session memory. <strong>Refreshing</strong> will flush the current buffer.</p>
        </section>

        <section class="editor-container">
            <textarea id="textInput" placeholder="> Initializing input buffer..."></textarea>
            <div class="editor-footer">
                <div id="charCount">0 CHARS</div>
                <div>ENC: UTF-8</div>
            </div>
        </section>
    </main>

    <script>
        const textarea = document.getElementById('textInput');
        const charCountDisplay = document.getElementById('charCount');

        textarea.addEventListener('input', () => {
            charCountDisplay.innerText = `${textarea.value.length.toLocaleString()} CHARS`;
        });

        function clearEditor() {
            if (confirm("Execute buffer wipe?")) {
                textarea.value = '';
                charCountDisplay.innerText = '0 CHARS';
            }
        }

        function downloadFile() {
            const blob = new Blob([textarea.value], { type: 'text/plain' });
            const link = document.createElement('a');
            link.download = `j_projects_note_${new Date().toISOString().slice(0,10)}.txt`;
            link.href = window.URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
