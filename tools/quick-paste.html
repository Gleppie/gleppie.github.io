<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Paste | Glep's Bean Bag</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            <h1>QUICK PASTE</h1>
        </div>
        
        <ul>
            <li><a href="../index.html">← Back</a></li>
        </ul>

        <div style="margin-top: auto;">
            <button id="footerBtn" onclick="downloadFile()" style="width: 100%;">Download .txt</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="disclaimer-card">
            <div class="disclaimer-header">
                <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h2>Session Privacy</h2>
            </div>
            <p>Content is stored locally. <strong>Refreshing the page</strong> may clear unsaved text.</p>
        </div>

        <div class="editor-container">
            <textarea id="textInput" placeholder="Paste or type content here..."></textarea>
            <div class="editor-footer">
                <span id="charCount">0 Characters</span>
                <span class="label-text">UTF-8 Encoding</span>
            </div>
        </div>
    </main>

    <script> 
            const textarea = document.getElementById('textInput');
    const charCountDisplay = document.getElementById('charCount');

    // Live character count
    textarea.addEventListener('input', () => {
        const count = textarea.value.length;
        charCountDisplay.innerText = `${count.toLocaleString()} Characters`;
    });

    function downloadFile() {
        const textContent = textarea.value;
        if (!textContent) {
            alert("Please enter some text first.");
            return;
        }
        
        const blob = new Blob([textContent], { type: 'text/plain' });
        const link = document.createElement('a');
        
        // Dynamic filename based on first line or timestamp
        const timestamp = new Date().toISOString().slice(0,10);
        link.download = `paste_${timestamp}.txt`;
        
        link.href = window.URL.createObjectURL(blob);
        link.click();
        window.URL.revokeObjectURL(link.href);
    }
    </script>
</body>
</html>
