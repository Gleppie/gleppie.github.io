<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Custom Messages | Glep's Bean Bag</title>
 <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <h1>Discord Webhooks Rich <Embed></Embed></h1>
        </div>
        <ul style="list-style: none; padding: 0; margin: 20px 0;">
            <li><a href="../index.html" style="color: var(--text-dim); text-decoration: none;">← Back</a></li>
        </ul>
        <div style="margin-top: auto;">
            <button onclick="sendMessage()" style="width: 100%;">Send to Discord</button>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 2.5rem;">
            <h2>Discord Custom Messages</h2>
            <p style="color: var(--text-dim);">Send rich embeds or plain text notifications via webhooks.</p>
        </header>

        <div class="data-card" style="margin-bottom: 1.5rem;">
            <span class="label-text">Webhook URL</span>
            <input type="text" id="webhookUrl" placeholder="Paste Discord Webhook URL here..." class="dashboard-input">
        </div>

        <div class="webhook-grid">
            <div class="data-card" style="grid-column: 1 / -1;">
                <span class="label-text">Message Type</span>
                <select id="msgType" onchange="toggleMode()">
                    <option value="text">Plain Text</option>
                    <option value="embed">Rich Embed</option>
                </select>
            </div>

            <div id="textSection" class="data-card" style="grid-column: 1 / -1;">
                <span class="label-text">Content</span>
                <textarea id="content" rows="4" placeholder="What's on your mind?"></textarea>
            </div>

            <div id="embedSection" class="hidden" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="data-card">
                    <span class="label-text">Embed Title</span>
                    <input type="text" id="eTitle" placeholder="Title" class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Theme Color</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="color" id="eColor" value="#5865f2" style="height: 40px; width: 60px; background: none; border: none; cursor: pointer;">
                        <label style="font-size: 0.8rem;"><input type="checkbox" id="randomColor"> Random</label>
                    </div>
                </div>
                <div class="data-card" style="grid-column: 1 / -1;">
                    <span class="label-text">Description</span>
                    <textarea id="eDesc" rows="3" placeholder="Description content..."></textarea>
                </div>
                <div class="data-card">
                    <span class="label-text">Author Name</span>
                    <input type="text" id="eAuthor" placeholder="Sender Name" class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Author Icon URL</span>
                    <input type="url" id="eAuthorIcon" placeholder="https://..." class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Thumbnail URL</span>
                    <input type="url" id="eThumb" placeholder="Small side image URL" class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Large Image URL</span>
                    <input type="url" id="eImage" placeholder="Bottom image URL" class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Footer Text</span>
                    <input type="text" id="eFooter" placeholder="Footer text" class="dashboard-input">
                </div>
                <div class="data-card">
                    <span class="label-text">Footer Icon URL</span>
                    <input type="url" id="eFooterIcon" placeholder="https://..." class="dashboard-input">
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMode() {
            const isEmbed = document.getElementById('msgType').value === 'embed';
            const embedSec = document.getElementById('embedSection');
            const textSec = document.getElementById('textSection');
            
            if (isEmbed) {
                embedSec.classList.remove('hidden');
                textSec.classList.add('hidden');
            } else {
                embedSec.classList.add('hidden');
                textSec.classList.remove('hidden');
            }
        }

        function clean(obj) {
            for (const key in obj) {
                if (obj[key] === null || obj[key] === undefined || obj[key] === "" || (typeof obj[key] === 'object' && Object.keys(obj[key]).length === 0)) {
                    delete obj[key];
                }
            }
            return Object.keys(obj).length === 0 ? null : obj;
        }

        async function sendMessage() {
            const url = document.getElementById('webhookUrl').value.trim();
            const type = document.getElementById('msgType').value;
            const isRandom = document.getElementById('randomColor').checked;
            
            if (!url.startsWith('https://discord.com/api/webhooks/')) {
                return alert("⚠️ Please provide a valid Discord Webhook URL.");
            }

            let payload = {};

            if (type === 'text') {
                payload.content = document.getElementById('content').value;
                if (!payload.content.trim()) return alert("Message content cannot be empty.");
            } else {
                let colorDecimal;
                if (isRandom) {
                    colorDecimal = Math.floor(Math.random() * 16777215);
                } else {
                    const hex = document.getElementById('eColor').value.replace('#', '');
                    colorDecimal = parseInt(hex, 16) || 0;
                }

                const author = clean({
                    name: document.getElementById('eAuthor').value,
                    icon_url: document.getElementById('eAuthorIcon').value
                });

                const footer = clean({
                    text: document.getElementById('eFooter').value,
                    icon_url: document.getElementById('eFooterIcon').value
                });

                const thumbnail = clean({ url: document.getElementById('eThumb').value });
                const image = clean({ url: document.getElementById('eImage').value });

                const embed = {
                    title: document.getElementById('eTitle').value || null,
                    description: document.getElementById('eDesc').value || null,
                    color: colorDecimal,
                    author: author,
                    footer: footer,
                    thumbnail: thumbnail,
                    image: image
                };

                const cleanedEmbed = clean(embed);
                if (!cleanedEmbed || (!cleanedEmbed.title && !cleanedEmbed.description)) {
                    return alert("Embeds need at least a Title or Description.");
                }
                payload.embeds = [cleanedEmbed];
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ Message Sent Successfully!");
                } else {
                    const errorData = await response.json();
                    alert(`Discord Error: ${errorData.message}`);
                }
            } catch (err) {
                alert("Connection Failed: " + err.message);
            }
        }
    </script>
</body>
</html>
