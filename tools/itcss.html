<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to CSS | J Projects</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .preview-area {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            overflow: auto;
            padding: 2rem;
        }

        #css-code {
            width: 100%;
            height: 150px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #222;
            color: #10b981;
            padding: 1rem;
            border-radius: 0.75rem;
            resize: none;
        }

        input[type="file"]::file-selector-button {
            background: #1a1a1a;
            color: #10b981;
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <h1>J_Projects <span style="font-size: 0.5rem; vertical-align: middle; opacity: 0.5; display: block; margin-top: 4px;">PIXEL_CONVERTER_v1</span></h1>
        </div>
        
        <ul style="list-style: none; padding: 0; margin: 30px 0 10px 0;">
            <li>
                <a href="../index.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 8px;">
                    <span>←</span> DASHBOARD
                </a>
            </li>
        </ul>

        <div class="control-panel" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1rem;">
            <div>
                <span class="label-text">1. Source Image</span>
                <input type="file" id="upload" accept="image/*" style="width: 100%; margin-top: 8px; font-size: 0.7rem;">
            </div>

            <div>
                <span class="label-text">2. Pixel Scale: <strong id="scaleVal" style="color: #10b981;">1</strong>px</span>
                <input type="range" id="scale" min="1" max="20" value="1" style="width: 100%; margin-top: 10px; accent-color: #10b981;">
            </div>
        </div>

        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 10px;">
            <button id="copyBtn" style="width: 100%; background: #10b981; color: #000;">Copy CSS</button>
            <button id="downloadBtn" style="width: 100%; background: transparent; color: var(--text-dim); border: 1px solid var(--border);">Download HTML</button>
        </div>
        
        <div style="margin-top: auto; padding-bottom: 1rem;">
            <p style="font-size: 0.6rem; color: #334155; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em;">Status: Ready</p>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h2 style="text-transform: uppercase; letter-spacing: 0.2em; color: #10b981; font-weight: 800;">Image to CSS Shadow</h2>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.5rem;">Convert visual raster data into a single-div box-shadow payload.</p>
        </header>

        <div class="data-card full-width">
            <span class="label-text" style="margin-bottom: 1.5rem;">Live Render Preview</span>
            <div class="preview-area">
                <div id="css-pixel"></div>
            </div>
        </div>

        <div class="data-card full-width" style="margin-top: 1.5rem;">
            <span class="label-text">Generated Payload</span>
            <textarea id="css-code" readonly placeholder="Awaiting image upload..."></textarea>
        </div>

        <footer style="margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); color: #334155; font-size: 0.7rem; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase;">
            J Projects // Core Utility // ITCSS_v1
        </footer>
    </main>

    <script>
        const upload = document.getElementById('upload');
        const scaleInput = document.getElementById('scale');
        const scaleVal = document.getElementById('scaleVal');
        const cssPixel = document.getElementById('css-pixel');
        const cssCode = document.getElementById('css-code');

        let lastImage = null;

        scaleInput.addEventListener('input', () => {
            scaleVal.innerText = scaleInput.value;
            if (lastImage) processImage(lastImage);
        });

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    lastImage = img;
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function processImage(img) {
            const scale = parseInt(scaleInput.value);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const maxWidth = 80; 
            let w = img.width;
            let h = img.height;
            if (w > maxWidth) {
                h = (maxWidth / w) * h;
                w = maxWidth;
            }

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            const data = ctx.getImageData(0, 0, w, h).data;
            let shadows = [];

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    if (data[i + 3] > 10) { 
                        shadows.push(`${x * scale}px ${y * scale}px 0 ${scale / 2}px rgba(${data[i]},${data[i+1]},${data[i+2]},${data[i+3]/255})`);
                    }
                }
            }

            const style = `width: 0; height: 0; box-shadow: ${shadows.join(', ')};`;
            cssPixel.style.cssText = style;
            cssCode.value = style;
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            cssCode.select();
            document.execCommand('copy');
            const originalText = document.getElementById('copyBtn').innerText;
            document.getElementById('copyBtn').innerText = 'COPIED!';
            setTimeout(() => document.getElementById('copyBtn').innerText = originalText, 2000);
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if(!cssCode.value) return;
            const htmlContent = `<!DOCTYPE html><html><body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;">
            <div style="${cssCode.value}"></div>
            </body></html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'css-pixel-art.html';
            link.click();
        });
    </script>
</body>
</html>
