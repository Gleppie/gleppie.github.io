<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Last War Map Tool| Glep's Bean Bag</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
  
</head>
<body>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            <h1>Last War Map Tool</h1>
        </div>
        
        <ul id="toolMenu">
            <li><a href="../index.html">← Back</a></li>
            <li class="section-label" style="font-size: 0.65rem; color: var(--accent); font-weight: 800; margin: 1.5rem 0 0.5rem 1rem; text-transform: uppercase;">Draw Tools</li>
            <li><a href="#" onclick="setTool('brush')" id="brushBtn" class="active">Brush</a></li>
            <li><a href="#" onclick="setTool('rect')" id="rectBtn">Rectangle</a></li>
            <li><a href="#" onclick="setTool('arrow')" id="arrowBtn">Arrow</a></li>
            <li><a href="#" onclick="setTool('label')" id="labelBtn">Alliance Names</a></li>
            <li><a href="#" onclick="setTool('eraser')" id="eraserBtn" style="color: var(--danger);">Eraser</a></li>
        </ul>

        <div class="control-panel" style="margin-top: 1rem; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem;">
            <div>
                <span class="label-text">Alliance</span>
                <select id="labelSelect" style="width: 100%; background: var(--bg-input); color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; margin-top: 5px;">
                    <option>HO1Y</option>
                    <option>IRON</option>
                    <option>GREY</option>
                </select>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <input type="text" id="customText" placeholder="Custom..." style="flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-size: 0.8rem;">
                    <button onclick="addNewLabel()" style="background: var(--accent); color: white; border: none; padding: 0 10px; border-radius: 6px;">+</button>
                </div>
            </div>

            <div>
                <span class="label-text">Stroke & Size</span>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
                    <input type="color" id="colorPicker" value="#ef4444" style="border: none; background: none; width: 30px; height: 30px; cursor: pointer;">
                    <input type="range" id="sizePicker" min="2" max="100" value="15" style="flex: 1;">
                </div>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <button onclick="undo()" style="background: var(--bg-input); color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer;">UNDO</button>
            <button id="footerBtn" onclick="download()" style="width: 100%;">SAVE IMAGE</button>
        </div>
    </nav>

    <main class="main-content" style="max-width: none;">
        <div class="disclaimer-card" style="margin-bottom: 1.5rem; max-width: none;">
            <div class="disclaimer-header">
                <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <h2>Quick Upload</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <p>Upload a screenshot or photo to begin marking up.</p>
                <input type="file" id="upload" accept="image/*" class="custom-file-input">
            </div>
        </div>

        <div class="data-card" style="padding: 10px; display: flex; justify-content: center; overflow: auto; background: var(--bg-input); min-height: 400px; position: relative;">
            <canvas id="canvas" style="display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5);"></canvas>
            <div id="noImageText" style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); text-align: center;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 15px; opacity: 0.5;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <p>This is meant for last war players, but it can be used for other purposes as well.</p>
            </div>
        </div>
    </main>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorInput = document.getElementById('colorPicker');
        const sizeInput = document.getElementById('sizePicker');
        const upload = document.getElementById('upload');
        const noImageText = document.getElementById('noImageText');

        let tool = 'brush', isDrawing = false, startX, startY, snapshot;
        let undoStack = [];

        // 1. Image Upload Logic
        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    noImageText.style.display = 'none';
                    canvas.style.display = 'block';
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    undoStack = []; // Reset undo for new image
                    saveState();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // 2. Tool Management
        function setTool(t) {
            tool = t;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        }

        function addNewLabel() {
            const val = document.getElementById('customText').value;
            if(val) {
                const opt = document.createElement('option');
                opt.text = val;
                document.getElementById('labelSelect').add(opt);
                document.getElementById('labelSelect').value = val;
                document.getElementById('customText').value = "";
                setTool('label');
            }
        }

        // 3. Drawing Engine
        canvas.onmousedown = (e) => {
            if (undoStack.length === 0) return; // Don't draw if no image
            
            isDrawing = true;
            startX = e.offsetX;
            startY = e.offsetY;
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // Brush/Eraser Prep
            ctx.strokeStyle = (tool === 'eraser') ? '#ffffff' : colorInput.value;
            ctx.lineWidth = sizeInput.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (tool === 'label') {
                ctx.fillStyle = ctx.strokeStyle;
                ctx.font = `bold ${ctx.lineWidth * 2}px Arial`;
                ctx.fillText(document.getElementById('labelSelect').value, startX, startY);
                saveState();
                isDrawing = false;
            } else {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;

            if (tool === 'brush' || tool === 'eraser') {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                if (tool === 'rect') {
                    ctx.strokeRect(startX, startY, e.offsetX - startX, e.offsetY - startY);
                } else if (tool === 'arrow') {
                    const head = ctx.lineWidth * 2, angle = Math.atan2(e.offsetY - startY, e.offsetX - startX);
                    ctx.moveTo(startX, startY); ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.lineTo(e.offsetX - head * Math.cos(angle - Math.PI/6), e.offsetY - head * Math.sin(angle - Math.PI/6));
                    ctx.moveTo(e.offsetX, e.offsetY);
                    ctx.lineTo(e.offsetX - head * Math.cos(angle + Math.PI/6), e.offsetY - head * Math.sin(angle + Math.PI/6));
                    ctx.stroke();
                }
            }
        };

        canvas.onmouseup = () => {
            if (isDrawing) {
                saveState();
                isDrawing = false;
            }
        };

        // 4. Utility Functions
        function saveState() {
            if (undoStack.length >= 25) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop();
                ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
            }
        }

        function download() {
            if (undoStack.length === 0) return;
            const link = document.createElement('a');
            link.download = 'annotated-image.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Support Ctrl+Z
        window.onkeydown = (e) => { if (e.ctrlKey && e.key === 'z') undo(); };

           function setTool(t) {
            tool = t;
            document.querySelectorAll('#toolMenu a').forEach(b => b.classList.remove('active'));
            if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
            if(window.event) window.event.preventDefault();
        }
    </script>
</body>
</html>
