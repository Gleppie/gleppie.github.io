<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Glep's  Bean Bag</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

   
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><path d="M14 14h3v3h-3z"></path></svg>
            <h1>QR GEN</h1>
        </div>
        
        <ul>
            <li><a href="../index.html">← Back</a></li>
        </ul>

        <div class="contact-form" style="margin-top: 2rem;">
            <span class="label-text">Target URL</span>
            <input 
                type="url" 
                id="urlInput" 
                placeholder="https://example.com" 
                value="https://google.com"
                style="margin-top: 8px;"
            >
        </div>

        <div style="margin-top: auto;">
            <button id="footerBtn" onclick="generateQRCode()" style="width: 100%;">Generate Code</button>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 2.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">QR Code Studio</h2>
            <p style="color: var(--text-dim);">Create high-resolution scannable codes for links, text, or digital business cards.</p>
        </header>

        <div class="qr-display-grid" style="display: flex; justify-content: center; align-items: flex-start; gap: 2rem;">
            <div class="data-card" style="flex: 0 0 auto; text-align: center; padding: 2rem; background: #ffffff; border-radius: 16px;">
                <div id="qrcode" style="display: inline-block;"></div>
            </div>

            <div style="flex: 1; max-width: 400px;">
                <div class="disclaimer-card" style="margin-bottom: 1.5rem;">
                    <div class="disclaimer-header">
                        <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16V12"></path><path d="M12 8h.01"></path></svg>
                        <h2>Current Status</h2>
                    </div>
                    <p id="statusMessage">Ready to generate</p>
                </div>

                <div class="data-card">
                    <span class="label-text" style="display: block; margin-bottom: 10px;">Properties</span>
                    <ul style="list-style: none; font-size: 0.85rem; color: var(--text-dim); display: flex; flex-direction: column; gap: 8px;">
                        <li>• Format: <strong style="color: var(--text-main);">PNG / SVG</strong></li>
                        <li>• Error Correction: <strong style="color: var(--text-main);">High (H)</strong></li>
                        <li>• Size: <strong style="color: var(--text-main);">250x250px</strong></li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        function generateQRCode() {
            const urlInput = document.getElementById('urlInput');
            const qrcodeContainer = document.getElementById('qrcode');
            const statusMessage = document.getElementById('statusMessage');
            
            const url = urlInput.value.trim() || 'https://google.com';

            qrcodeContainer.innerHTML = '';
            statusMessage.innerHTML = `Encoding: <strong style="color: var(--text-main);">${url.length > 25 ? url.substring(0, 25) + '...' : url}</strong>`;
            
            try {
                new QRCode(qrcodeContainer, {
                    text: url,
                    width: 250,
                    height: 250,
                    colorDark : "#0f1115", // Matches your --bg-main for contrast
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch (error) {
                statusMessage.textContent = 'Error: Input is too long for this format.';
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateQRCode();
        });

        window.onload = generateQRCode;
    </script>
</body>
</html>
