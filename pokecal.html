<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Calculator | Glep's  Bean Bag</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .tool-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 8px 0; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent); }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        button:hover { opacity: 0.9; }

        #result-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .result-text { font-weight: 600; font-size: 1rem; margin: 0; }
        .wait-time { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin: 4px 0 16px 0; }

        #map {
            height: 300px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            z-index: 1;
        }

        /* Leaflet Fixes for Dark Mode */
        .leaflet-tile { filter: grayscale(1) invert(0); }
        @media (prefers-color-scheme: dark) {
            .leaflet-tile { filter: grayscale(0.8) invert(1) brightness(0.8) contrast(1.2); }
            .leaflet-container { background: #111 !important; }
        }

        .back-link {
            display: block;
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="tool-container" id="app">
    <a href="index.html" class="back-link" style="text-align: left; margin-bottom: 10px;">← Back</a>
    <h1>Cooldown Calculator</h1>
    <p class="subtitle">Calculate distance and Pokemon Go wait times between coordinates.</p>

    <div class="input-group">
        <input type="text" placeholder="Start: lat, lon" v-model="point1">
        <input type="text" placeholder="End: lat, lon" v-model="point2">
        <button @click="calculateDistance">Calculate Distance</button>
    </div>

    <div id="result-area" v-if="result">
        <p class="result-text">{{ result }}</p>
        <p class="wait-time">{{ waitTime }}</p>
        <div id="map"></div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            point1: '',
            point2: '',
            result: '',
            waitTime: '',
            map: null,
            marker1: null,
            marker2: null,
            polyline: null
        },
        methods: {
            calculateDistance() {
                const location1 = this.point1.split(",");
                const location2 = this.point2.split(",");
                if (location1.length < 2 || location2.length < 2) return;

                const lat1 = parseFloat(location1[0]);
                const lon1 = parseFloat(location1[1]);
                const lat2 = parseFloat(location2[0]);
                const lon2 = parseFloat(location2[1]);

                const R = 3959; // Miles
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                const distance = R * c;

                this.result = `Distance: ${distance.toFixed(2)} miles`;
                
                // Cooldown Logic
                let seconds = 0;
                if (distance <= 1) seconds = 30;
                else if (distance <= 5) seconds = 150;
                else if (distance <= 10) seconds = 420;
                else if (distance <= 100) seconds = 2100;
                else if (distance <= 250) seconds = 2700;
                else if (distance <= 500) seconds = 3600;
                else if (distance <= 1000) seconds = 5940;
                else seconds = 7200;

                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                this.waitTime = `Cooldown: ${h > 0 ? h + 'h ' : ''}${m > 0 ? m + 'm ' : ''}${s}s`;

                this.updateMap(lat1, lon1, lat2, lon2);
            },
            updateMap(lat1, lon1, lat2, lon2) {
                this.$nextTick(() => {
                    if (!this.map) {
                        this.map = L.map('map').setView([lat1, lon1], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
                    }
                    if (this.marker1) this.map.removeLayer(this.marker1);
                    if (this.marker2) this.map.removeLayer(this.marker2);
                    if (this.polyline) this.map.removeLayer(this.polyline);

                    this.marker1 = L.marker([lat1, lon1]).addTo(this.map);
                    this.marker2 = L.marker([lat2, lon2]).addTo(this.map);
                    this.polyline = L.polyline([[lat1, lon1], [lat2, lon2]], { color: '#0070f3' }).addTo(this.map);
                    
                    const group = new L.featureGroup([this.marker1, this.marker2]);
                    this.map.fitBounds(group.getBounds().pad(0.5));
                });
            }
        }
    });
</script>

</body>
</html>
