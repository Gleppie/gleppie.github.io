<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to CSS | Glep's Bean Bag</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --input-bg: #111111;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 680px; margin: 0 auto; }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }

        h1 { font-size: 1.8rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); margin-top: 8px; font-size: 1rem; }

        /* Tool Styles */
        .converter-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .controls { 
            margin: 20px 0; 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-hover);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        #preview-area { 
            padding: 40px; 
            border: 1px solid var(--border); 
            margin: 20px 0; 
            overflow: auto; 
            background: var(--card-hover);
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.8rem;
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .btn-secondary {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-link">← Back</a>
        <h1>Image to CSS</h1>
        <p class="subtitle">Convert any image into a single-div CSS box-shadow art piece.</p>
    </header>

    <div class="converter-box">
        <label>Upload Image</label>
        <input type="file" id="upload" accept="image/*">
        
        <div class="controls">
            <div class="slider-group">
                <label>Pixel Scale: <span id="scaleVal" style="color: var(--accent);">1</span>px</label>
                <input type="range" id="scale" min="1" max="20" value="1" style="flex: 1;">
            </div>
            
            <div class="button-group">
                <button id="copyBtn" class="btn-primary">Copy CSS</button>
                <button id="downloadBtn" class="btn-secondary">Download HTML</button>
            </div>
        </div>

        <label>Live Preview</label>
        <div id="preview-area">
            <div id="css-pixel"></div>
        </div>
        
        <label>Generated Code</label>
        <textarea id="css-code" readonly placeholder="CSS code will appear here..."></textarea>
    </div>
</div>

<script>
    const upload = document.getElementById('upload');
    const scaleInput = document.getElementById('scale');
    const scaleVal = document.getElementById('scaleVal');
    const cssPixel = document.getElementById('css-pixel');
    const cssCode = document.getElementById('css-code');

    let lastImage = null;

    scaleInput.addEventListener('input', () => {
        scaleVal.innerText = scaleInput.value;
        if (lastImage) processImage(lastImage);
    });

    upload.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                lastImage = img;
                processImage(img);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function processImage(img) {
        const scale = parseInt(scaleInput.value);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        const maxWidth = 80; // Slightly smaller to ensure performance
        let w = img.width;
        let h = img.height;
        if (w > maxWidth) {
            h = (maxWidth / w) * h;
            w = maxWidth;
        }

        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const data = ctx.getImageData(0, 0, w, h).data;
        let shadows = [];

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                if (data[i + 3] > 10) { // Transparency threshold
                    shadows.push(`${x * scale}px ${y * scale}px 0 ${scale / 2}px rgba(${data[i]},${data[i+1]},${data[i+2]},${data[i+3]/255})`);
                }
            }
        }

        const style = `width: 0; height: 0; box-shadow: ${shadows.join(', ')};`;
        cssPixel.style.cssText = style;
        cssCode.value = style;
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
        if(!cssCode.value) return;
        cssCode.select();
        document.execCommand('copy');
        const originalText = document.getElementById('copyBtn').innerText;
        document.getElementById('copyBtn').innerText = 'Copied!';
        setTimeout(() => document.getElementById('copyBtn').innerText = originalText, 2000);
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        if(!cssCode.value) return;
        const htmlContent = `<!DOCTYPE html><html><body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;">
        <div style="${cssCode.value}"></div>
        </body></html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'css-pixel-art.html';
        link.click();
    });
</script>

</body>
</html>
