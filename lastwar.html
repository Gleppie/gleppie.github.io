<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Survival Map | Glep's Bean Bag</title>
        <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            <h1>MAP</h1>
        </div>
        
        <ul id="toolMenu">
            <li><a href="index.html">← Back</a></li>
            <li class="section-label" style="font-size: 0.65rem; color: var(--accent); font-weight: 800; margin: 1.5rem 0 0.5rem 1rem; text-transform: uppercase;">Draw Tools</li>
            <li><a href="#" class="btn-tool active" onclick="setMode('paint', this)">Brush</a></li>
            <li><a href="#" class="btn-tool" onclick="setMode('line', this)">Line</a></li>
            <li><a href="#" class="btn-tool" onclick="setMode('rect', this)">Box</a></li>
            <li><a href="#" class="btn-tool" onclick="setMode('circle', this)">Circle</a></li>
            <li><a href="#" class="btn-tool" onclick="setMode('text', this)">Tactical Note</a></li>
            <li><a href="#" class="btn-tool" onclick="setMode('erase', this)" style="color: var(--danger);">Eraser</a></li>
        </ul>

        <div class="control-panel" style="margin-top: 1.5rem; padding: 0 1rem; display: flex; flex-direction: column; gap: 1.25rem;">
            <div>
                <span class="label-text">Color</span>
                <input type="color" id="colorPicker" value="#6366f1" style="width: 100%; height: 35px; border: none; background: none; cursor: pointer;">
            </div>
            <div>
                <span class="label-text">Stroke Size: <strong id="sizeVal" style="color: var(--accent);">4</strong></span>
                <input type="range" id="brushSize" min="1" max="60" value="4" oninput="document.getElementById('sizeVal').innerText = this.value" style="width: 100%; margin-top: 8px;">
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="undo()" style="background: var(--bg-input); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;">Undo</button>
                <button onclick="clearMap()" style="background: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.2); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;">Clear</button>
            </div>
            <button id="footerBtn" onclick="downloadMap()" style="width: 100%;">Export PNG</button>
        </div>
    </nav>

    <main class="main-content" style="max-width: none;">
        <div class="disclaimer-card" style="margin-bottom: 1.5rem; max-width: none;">
            <div class="disclaimer-header">
                <svg class="emblem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16V12"></path><path d="M12 8h.01"></path></svg>
                <h2>Tactical Interface</h2>
            </div>
            <p>Use the <strong>Joystick</strong> (Mobile) or <strong>Click-Drag</strong> (Desktop) to navigate the terrain. Current Coords: <span id="coords" style="color: var(--accent); font-weight: bold;">0, 0</span></p>
        </div>

        <div id="map-container" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: scroll; position: relative; height: calc(100vh - 200px);">
            <div id="canvas-stack" style="position: relative; margin: 0 auto; cursor: crosshair;">
                <canvas id="map-layer" style="position: absolute; top: 0; left: 0;"></canvas>
                <canvas id="draw-layer" style="position: absolute; top: 0; left: 0; z-index: 5;"></canvas>
            </div>
        </div>

        <div id="joystick-base" style="position: fixed; bottom: 30px; right: 30px; width: 100px; height: 100px; background: rgba(0,0,0,0.5); border: 2px solid var(--border); border-radius: 50%; z-index: 1000; display: none;">
            <div id="joystick-stick" style="position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%);"></div>
        </div>
    </main>
<script>
    const container = document.getElementById('map-container');
    const mapC = document.getElementById('map-layer');
    const drawC = document.getElementById('draw-layer');
    const mctx = mapC.getContext('2d');
    const dctx = drawC.getContext('2d');
    
    let isDrawing = false;
    let startX, startY;
    let currentMode = 'paint';
    let snapshot = null;
    let history = [];

    const mapImg = new Image();
    mapImg.src = 'images/map2.png'; 

    mapImg.onload = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        document.getElementById('canvas-stack').style.width = w + 'px';
        document.getElementById('canvas-stack').style.height = h + 'px';
        mctx.drawImage(mapImg, 0, 0, w, h);
        saveState();
    };

    mapImg.onerror = () => {
        const w = 1100, h = 825;
        mapC.width = drawC.width = w;
        mapC.height = drawC.height = h;
        mctx.fillStyle = "#111"; 
        mctx.fillRect(0,0,w,h);
        saveState();
    };

    const jBase = document.getElementById('joystick-base');
    const jStick = document.getElementById('joystick-stick');
    let jActive = false;
    let jInput = { x: 0, y: 0 };

    const handleJoystick = (e) => {
        if (!jActive) return;
        const touch = e.touches[0];
        const rect = jBase.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), rect.width / 2);
        const angle = Math.atan2(dy, dx);
        const moveX = Math.cos(angle) * dist;
        const moveY = Math.sin(angle) * dist;
        jStick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        jInput.x = moveX / (rect.width / 2);
        jInput.y = moveY / (rect.height / 2);
    };

    jBase.addEventListener('touchstart', (e) => { jActive = true; });
    window.addEventListener('touchmove', (e) => { if(jActive) { e.preventDefault(); handleJoystick(e); } }, {passive: false});
    window.addEventListener('touchend', () => { 
        jActive = false; jInput = { x: 0, y: 0 }; 
        jStick.style.transform = `translate(-50%, -50%)`;
    });

    function updatePan() {
        if (jInput.x !== 0 || jInput.y !== 0) {
            container.scrollLeft += jInput.x * 12;
            container.scrollTop += jInput.y * 12;
        }
        requestAnimationFrame(updatePan);
    }
    updatePan();

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function saveState() {
        if (history.length > 25) history.shift();
        history.push(dctx.getImageData(0, 0, drawC.width, drawC.height));
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            dctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    const getPos = (e) => {
        const rect = drawC.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (drawC.width / rect.width), 
            y: (clientY - rect.top) * (drawC.height / rect.height) 
        };
    };

    const startDraw = (e) => {
        const p = getPos(e);
        isDrawing = true;
        startX = p.x; startY = p.y;
        dctx.strokeStyle = document.getElementById('colorPicker').value;
        dctx.lineWidth = document.getElementById('brushSize').value;
        dctx.lineCap = dctx.lineJoin = 'round';

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.beginPath(); dctx.moveTo(p.x, p.y);
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            snapshot = dctx.getImageData(0, 0, drawC.width, drawC.height);
        } else if (currentMode === 'text') {
            const txt = prompt("Note:");
            if (txt) {
                dctx.fillStyle = document.getElementById('colorPicker').value;
                dctx.font = `600 ${document.getElementById('brushSize').value * 3}px sans-serif`;
                dctx.fillText(txt, p.x, p.y);
                saveState();
            }
            isDrawing = false;
        }
    };

    const moveDraw = (e) => {
        const p = getPos(e);
        document.getElementById('coords').innerText = `${Math.round(p.x)}, ${Math.round(p.y)}`;
        if (!isDrawing) return;

        if (currentMode === 'paint' || currentMode === 'erase') {
            dctx.globalCompositeOperation = (currentMode === 'erase') ? 'destination-out' : 'source-over';
            dctx.lineTo(p.x, p.y); dctx.stroke();
        } else if (['rect', 'circle', 'line'].includes(currentMode)) {
            dctx.putImageData(snapshot, 0, 0);
            dctx.beginPath();
            if (currentMode === 'rect') dctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
            else if (currentMode === 'circle') {
                let r = Math.sqrt(Math.pow(p.x - startX, 2) + Math.pow(p.y - startY, 2));
                dctx.arc(startX, startY, r, 0, 2 * Math.PI); dctx.stroke();
            } else if (currentMode === 'line') {
                dctx.moveTo(startX, startY); dctx.lineTo(p.x, p.y); dctx.stroke();
            }
        }
    };

    drawC.onmousedown = startDraw;
    drawC.onmousemove = moveDraw;
    window.onmouseup = () => { if (isDrawing) saveState(); isDrawing = false; };

    drawC.addEventListener('touchstart', (e) => { if (e.target === drawC) e.preventDefault(); startDraw(e); }, { passive: false });
    drawC.addEventListener('touchmove', (e) => { if (e.target === drawC) e.preventDefault(); moveDraw(e); }, { passive: false });
    drawC.addEventListener('touchend', () => { if (isDrawing) saveState(); isDrawing = false; });

    function clearMap() { if(confirm("Clear markings?")) { dctx.clearRect(0,0,drawC.width, drawC.height); saveState(); } }
    function downloadMap() {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = mapC.width; finalCanvas.height = mapC.height;
        const fctx = finalCanvas.getContext('2d');
        fctx.drawImage(mapC, 0, 0); fctx.drawImage(drawC, 0, 0);
        const link = document.createElement('a');
        link.download = `Tactical-Map.png`;
        link.href = finalCanvas.toDataURL(); link.click();
    }
</script>
</body>
</html>
