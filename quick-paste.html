<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Paste | Glep's Bean Bag</title>
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-dim: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
            --card-hover: #f0f0f0;
            --panel-bg: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-main: #ededed;
                --text-dim: #a0a0a0;
                --accent: #3291ff;
                --border: #222222;
                --card-hover: #161616;
                --panel-bg: rgba(30, 30, 30, 0.7);
            }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-color);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .left-sect { display: flex; align-items: center; gap: 15px; }
        .logo { font-weight: 700; font-size: 0.9rem; letter-spacing: -0.5px; white-space: nowrap; }
        .logo span { color: var(--text-dim); font-weight: 400; font-size: 0.8rem; margin-left: 4px; }
        
        .back-link { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; }

        button {
            background: var(--accent); 
            border: none; 
            color: white;
            padding: 8px 16px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            transition: 0.2s; 
            white-space: nowrap;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background-color: var(--card-hover);
        }

        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            border: none;
            padding: 20px;
            background: transparent;
            color: var(--text-main);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .footer-info {
            padding: 8px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            main { padding: 10px; }
            .logo span { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="left-sect">
        <a href="index.html" class="back-link">←</a>
        <div class="logo">Quick Paste <span>TEXT UTILITY</span></div>
    </div>
    <div class="header-actions">
        <button onclick="downloadFile()">Download .txt</button>
    </div>
</header>

<main>
    <div class="editor-container">
        <textarea id="textInput" placeholder="Paste or type content here..."></textarea>
        <div class="footer-info">
            <div id="charCount">0 Characters</div>
            <div>Ready for Export</div>
        </div>
    </div>
</main>

<script>
    const textarea = document.getElementById('textInput');
    const charCountDisplay = document.getElementById('charCount');

    // Live character count
    textarea.addEventListener('input', () => {
        const count = textarea.value.length;
        charCountDisplay.innerText = `${count.toLocaleString()} Characters`;
    });

    function downloadFile() {
        const textContent = textarea.value;
        if (!textContent) {
            alert("Please enter some text first.");
            return;
        }
        
        const blob = new Blob([textContent], { type: 'text/plain' });
        const link = document.createElement('a');
        
        // Dynamic filename based on first line or timestamp
        const timestamp = new Date().toISOString().slice(0,10);
        link.download = `paste_${timestamp}.txt`;
        
        link.href = window.URL.createObjectURL(blob);
        link.click();
        window.URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
